<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Grows</title>
  <link rel="apple-touch-icon" href="image/giantpinecone.png" />
  <meta name="apple-mobile-web-app-title" content="Grows" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Noto Sans', sans-serif;
    }
    body {
      background-image: url("image/brown-background.png");
      background-size: cover;
      background-position: center;
      margin: 0;
    }
    .top {
      background-image: url("image/green bar.png");
      background-size: cover;
      background-repeat: no-repeat;
      background-position: center;
      width: 100%;
      height: 10vh;
    }
    table {
      width: 100%;
      margin: 1vh auto;
    }
    .seed {
      height: 12vh;
      max-height: 80px;
    }
    .seed-back {
      width: 90%;
      margin: 2vh auto;
      padding: 1vh;
      background-color: rgb(130, 74, 21);
      border-radius: 1rem;
    }
    .seed-name {
      color: white;
      font-weight: 700;
      font-size: 1.2rem;
    }
    .stock-num {
      color: rgb(65, 65, 65);
      font-weight: bold;
      font-size: 1rem;
    }
    .cost {
      color: red;
      font-weight: bold;
      font-size: 1.1rem;
    }
    .box {
      width: 25vw;
      max-width: 80px;
      display: block;
      margin: 0 auto;
    }

    @media screen and (min-width: 600px) {
      .seed {
        height: 100px;
      }
      .seed-back {
        width: 70%;
      }
    }
  </style>
</head>
<body>
  <div class="top"></div>

  <div class="seed-back">
    <table>
      <tr>
        <td rowspan="3">
          <img src="image/carrot.png" alt="carrot" class="seed">
        </td>
        <td class="seed-name">Carrot Seed</td>
      </tr>
      <tr>
        <td class="stock-num">x0 Stock</td>
      </tr>
      <tr>
        <td class="cost">NO STOCK</td>
        <td><img src="image/common.png" alt="common" class="box"></td>
      </tr>
    </table>
  </div>

  <div class="seed-back">
    <table>
      <tr>
        <td rowspan="3">
          <img src="image/strawberry.png" alt="strawberry" class="seed">
        </td>
        <td class="seed-name">Strawberry Seed</td>
      </tr>
      <tr>
        <td class="stock-num">x0 Stock</td>
      </tr>
      <tr>
        <td class="cost">NO STOCK</td>
        <td><img src="image/common.png" alt="common" class="box"></td>
      </tr>
    </table>
  </div>

  <div class="seed-back">
    <table>
      <tr>
        <td rowspan="3">
          <img src="image/blueberry.png" alt="blueberry" class="seed">
        </td>
        <td class="seed-name">Blueberry Seed</td>
      </tr>
      <tr>
        <td class="stock-num">x0 Stock</td>
      </tr>
      <tr>
        <td class="cost">NO STOCK</td>
        <td><img src="image/common.png" alt="common" class="box"></td>
      </tr>
    </table>
  </div>

  <div class="seed-back">
    <table>
      <tr>
        <td rowspan="3">
          <img src="image/orangetulip.png" alt="orangetulip" class="seed">
        </td>
        <td class="seed-name">Orange Tulip Seed</td>
      </tr>
      <tr>
        <td class="stock-num">x0 Stock</td>
      </tr>
      <tr>
        <td class="cost">NO STOCK</td>
        <td><img src="image/common.png" alt="common" class="box"></td>
      </tr>
    </table>
  </div>
</body>
</html>
